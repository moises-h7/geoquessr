<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GeoQuessr — Quiz de bandeiras do mundo. Adivinhe o país pela bandeira.">
    <title>GeoQuessr — Quiz de Bandeiras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/globe.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-landing">

    <main class="landing-main">
        <section class="start-card" aria-label="Tela inicial do GeoQuessr">
            <header class="start-card__header">
                <span class="logo-icon" aria-hidden="true">🌍</span>
                <h1 class="logo-text">Geo<span class="accent">Quessr</span></h1>
            </header>

            <p class="subtitle">
                Adivinhe o país pela bandeira.<br>
                Você tem 3 vidas — não erre demais!
            </p>

            <div class="stats-preview" role="list" aria-label="Estatísticas do jogo">
                <div class="stat-item" role="listitem">
                    <span class="stat-number" id="total-countries">…</span>
                    <span class="stat-label">Países</span>
                </div>
                <div class="stat-item" role="listitem">
                    <span class="stat-number">10</span>
                    <span class="stat-label">Perguntas</span>
                </div>
                <div class="stat-item" role="listitem">
                    <span class="stat-number">3</span>
                    <span class="stat-label">Vidas</span>
                </div>
            </div>

            <a id="btn-start" class="btn-primary btn-primary--disabled" href="quiz.html" aria-label="Iniciar o quiz">
                <span class="btn-text">Carregando…</span>
                <span class="btn-icon" aria-hidden="true">→</span>
            </a>

            <p class="api-credit">via <abbr title="Rest Countries API">RestCountries</abbr> · dados públicos</p>
        </section>
    </main>

    <footer class="landing-footer">
        <p>GeoQuessr &copy; 2026 · Estudo Dirigido 2 · HTML, CSS &amp; JavaScript</p>
    </footer>

    <script>
        // Apenas valida a API antes de liberar o botão
        const btn = document.getElementById('btn-start');
        const countEl = document.getElementById('total-countries');

        fetch('https://restcountries.com/v3.1/all?fields=name,flags')
            .then(r => r.json())
            .then(data => {
                const valid = data.filter(c => c.flags?.svg && c.name?.common);
                countEl.textContent = valid.length;
                btn.classList.remove('btn-primary--disabled');
                btn.querySelector('.btn-text').textContent = 'Iniciar Quiz';
            })
            .catch(() => {
                countEl.textContent = '?';
                btn.classList.remove('btn-primary--disabled');
                btn.querySelector('.btn-text').textContent = 'Iniciar mesmo assim';
            });
    </script>
</body>
</html>
